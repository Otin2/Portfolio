<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img">
  <!-- Mini-mock del propio sitio en 16:9 (formato del pop-up). La tarjeta lo
       recorta a 3.2:1 con object-fit: cover, así que TODO lo importante vive
       en la banda central y = 80..280; arriba/abajo solo hay fondo y barra. -->
  <rect width="640" height="360" fill="#060b18"/>

  <!-- Barra de ventana (solo visible en el pop-up) -->
  <rect x="0" y="0" width="640" height="34" fill="#0b1226"/>
  <circle cx="20" cy="17" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="17" r="5" fill="#febc2e"/>
  <circle cx="56" cy="17" r="5" fill="#28c840"/>
  <text x="320" y="21" fill="#5b6170" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">rroller@dev: ~/portfolio</text>

  <!-- Texto del hero (dentro de la banda central) -->
  <text x="42" y="128" font-family="'JetBrains Mono', monospace" font-size="13">
    <tspan fill="#28c840">rroller@dev</tspan><tspan fill="#787f8e">:~$</tspan><tspan fill="#c7cede"> ./portfolio --lang=es|en</tspan>
  </text>
  <text x="42" y="168" fill="#e8ecf5" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">Hola, soy</text>
  <text x="42" y="202" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">
    <tspan fill="#0d6efd">Rolando </tspan><tspan fill="#0891b2">Roller</tspan>
  </text>
  <text x="42" y="236" fill="#787f8e" font-family="'JetBrains Mono', monospace" font-size="12.5">Astro · Three.js · JS · CSS</text>
  <rect x="272" y="184" width="10" height="17" fill="#0d6efd">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Esfera neuronal de puntos (centrada en la banda) -->
  <g fill="#0d6efd">
    <circle cx="500" cy="180" r="2.6" opacity="0.9"/>
    <circle cx="460" cy="150" r="2.4" opacity="0.75"/>
    <circle cx="540" cy="150" r="2.4" opacity="0.75"/>
    <circle cx="448" cy="196" r="2.4" opacity="0.7"/>
    <circle cx="552" cy="196" r="2.4" opacity="0.7"/>
    <circle cx="480" cy="228" r="2.2" opacity="0.6"/>
    <circle cx="520" cy="228" r="2.2" opacity="0.6"/>
    <circle cx="500" cy="118" r="2.2" opacity="0.6"/>
    <circle cx="476" cy="166" r="2" opacity="0.85"/>
    <circle cx="524" cy="166" r="2" opacity="0.85"/>
    <circle cx="466" cy="214" r="2" opacity="0.55"/>
    <circle cx="534" cy="214" r="2" opacity="0.55"/>
    <circle cx="500" cy="242" r="2" opacity="0.5"/>
  </g>
  <g stroke="#0891b2" stroke-width="0.8" opacity="0.45">
    <line x1="500" y1="180" x2="460" y2="150"/>
    <line x1="500" y1="180" x2="540" y2="150"/>
    <line x1="500" y1="180" x2="448" y2="196"/>
    <line x1="500" y1="180" x2="552" y2="196"/>
    <line x1="460" y1="150" x2="500" y2="118"/>
    <line x1="540" y1="150" x2="500" y2="118"/>
    <line x1="448" y1="196" x2="480" y2="228"/>
    <line x1="552" y1="196" x2="520" y2="228"/>
    <line x1="480" y1="228" x2="500" y2="242"/>
    <line x1="520" y1="228" x2="500" y2="242"/>
    <line x1="476" y1="166" x2="524" y2="166"/>
  </g>
</svg>
